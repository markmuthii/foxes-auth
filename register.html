<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - Foxes Auth</title>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
      </ul>
    </nav>

    <!-- Registration Form -->
    <form>
      <!-- First Name -->
      <label for="firstName">First Name</label>
      <input id="firstName" type="text" placeholder="Eg. John" required />

      <!-- Last Name -->
      <label for="lastName">Last Name</label>
      <input id="lastName" type="text" placeholder="Eg. Wick" required />

      <!-- Email -->
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="Eg. john@wick.com" required />

      <!-- Phone Number -->
      <label for="phone">Phone Number</label>
      <input id="phone" type="tel" placeholder="Eg. +254723123456" required />

      <!-- Username -->
      <label for="username">Username</label>
      <input id="username" type="text" placeholder="Eg. johnwick" required />

      <!-- Password -->
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="**********" required />

      <!-- Confirm Password -->
      <label for="confirmPassword">Confirm Password</label>
      <input
        id="confirmPassword"
        type="password"
        placeholder="**********"
        required
      />

      <button type="submit">Register</button>
    </form>
  </body>
</html>
